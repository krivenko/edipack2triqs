name: Test (Ubuntu)

on:
  push:
    branches:
      - main
      - ci
  pull_request:
    branches:
      - main
  schedule:
    - cron:  '0 0 * * 2'

jobs:
  test:
    runs-on: ubuntu-24.04
    strategy:
      matrix:
        python-version:
          - "3.10"

    env:
      DEPLOY_DOCS: ${{ github.ref == 'refs/heads/main' &&
                       matrix.python-version == '3.13' }}

    steps:
    - name: Install dependencies
      run: |
           sudo apt-get update -q
           sudo apt-get install -y gfortran libopenmpi-dev libboost-dev \
               libblas-dev liblapack-dev libfftw3-dev libgmp-dev libhdf5-dev

    - name: Build & install SciFortran
      env:
        FC: mpifort
      run: |
           git clone https://github.com/SciFortran/SciFortran.git scifor.git
           mkdir scifor.build && pushd scifor.build
           cmake ../scifor.git -DCMAKE_BUILD_TYPE=Release
           make -j2
           make install
           popd

    - name: Build & install EDIpack2.0
      env:
        FC: mpifort
      run: |
           git clone https://github.com/edipack/EDIpack2.0 EDIpack2.git
           mkdir EDIpack2.build && pushd EDIpack2.build
           source $(readlink -f ${HOME}/opt/scifor/gnu/*/bin/scifor_config_user.sh)
           cmake ../EDIpack2.git -DCMAKE_BUILD_TYPE=Release
           make -j2
           make install
           popd

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install Python dependencies
      run: |
           python -m pip install --upgrade pip
           pip install --user numpy scipy matplotlib mpi4py mako pytest networkx edipy2
           python3 -c "from ctypes import *; asd=CDLL('/home/runner/opt/edipack2/gnu/3.0.0-3-g4889ee9/lib/libedipack2_cbinding.so'); print(c_int.in_dll(asd,'Nspin'))"

